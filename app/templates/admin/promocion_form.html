<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{% if promocion %}Editar{% else %}Agregar{% endif %} Promoción | El Barril</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1a1c1d", "primary": "#650006", "on-surface-variant": "#5a403e",
                    "surface": "#f9f9fa", "error": "#ba1a1a", "surface-container-low": "#f3f3f4",
                    "on-primary": "#ffffff"
            },
            "fontFamily": { "headline-sm": ["Newsreader"], "label-lg": ["Be Vietnam Pro"], "label-md": ["Be Vietnam Pro"] }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        input:focus, textarea:focus { outline: none; border-color: #650006 !important; box-shadow: 0 0 0 1px #650006; }
        body { background-color: #f9f9fa; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center">

<header class="w-full border-b-2 border-on-surface/10 bg-surface flex items-center justify-between px-4 h-14 fixed top-0 z-50">
<a href="{{ url_for('admin.promociones') }}" class="flex items-center gap-1 text-primary p-2 rounded-lg">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-label-lg text-sm">Cancelar</span>
</a>
<h1 class="font-headline-sm text-xl text-primary font-bold">{% if promocion %}Editar{% else %}Agregar{% endif %} Promo</h1>
<div class="w-16"></div>
</header>

<main class="w-full max-w-2xl pt-20 pb-32 px-4">
<form method="POST" class="space-y-6" id="promo-form">

<section class="bg-surface-container-low p-4 rounded-lg border border-on-surface/10">
<div class="flex items-center gap-2 mb-3 text-primary">
<span class="material-symbols-outlined">translate</span>
<h2 class="font-label-lg text-sm uppercase">Título</h2>
</div>
<div class="space-y-3">
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Español</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="titulo_es" required type="text" value="{{ promocion.titulo_es if promocion else '' }}"/>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">English</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="titulo_en" type="text" value="{{ promocion.titulo_en if promocion else '' }}"/>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Français</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="titulo_fr" type="text" value="{{ promocion.titulo_fr if promocion else '' }}"/>
</div>
</div>
</section>

<section class="bg-surface-container-low p-4 rounded-lg border border-on-surface/10">
<div class="flex items-center gap-2 mb-3 text-primary">
<span class="material-symbols-outlined">description</span>
<h2 class="font-label-lg text-sm uppercase">Descripción</h2>
</div>
<div class="space-y-3">
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Español</label>
<textarea class="w-full p-3 bg-white border-2 border-on-surface/10 rounded-lg resize-none" name="descripcion_es" rows="2">{{ promocion.descripcion_es if promocion else '' }}</textarea>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">English</label>
<textarea class="w-full p-3 bg-white border-2 border-on-surface/10 rounded-lg resize-none" name="descripcion_en" rows="2">{{ promocion.descripcion_en if promocion else '' }}</textarea>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Français</label>
<textarea class="w-full p-3 bg-white border-2 border-on-surface/10 rounded-lg resize-none" name="descripcion_fr" rows="2">{{ promocion.descripcion_fr if promocion else '' }}</textarea>
</div>
</div>
</section>

<section class="bg-surface-container-low p-4 rounded-lg border border-on-surface/10">
<div class="flex items-center gap-2 mb-3 text-primary">
<span class="material-symbols-outlined">event</span>
<h2 class="font-label-lg text-sm uppercase">Vigencia</h2>
</div>
<div class="grid grid-cols-2 gap-3">
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Desde</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="fecha_inicio" required type="date" value="{{ promocion.fecha_inicio if promocion else '' }}"/>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Hasta</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="fecha_fin" required type="date" value="{{ promocion.fecha_fin if promocion else '' }}"/>
</div>
</div>
</section>

{% if promocion %}
<div class="pt-2">
<button type="submit" formaction="{{ url_for('admin.promocion_eliminar', promo_id=promocion.id) }}" formmethod="POST"
        class="w-full flex items-center justify-center gap-2 h-12 text-error font-label-lg rounded-lg border border-error/30"
        onclick="return confirm('¿Eliminar esta promoción?')">
<span class="material-symbols-outlined">delete</span> Eliminar Promoción
</button>
</div>
{% endif %}

</form>
</main>

<footer class="fixed bottom-0 left-0 w-full bg-surface border-t-2 border-on-surface/10 p-4 flex justify-center">
<button form="promo-form" type="submit" class="w-full max-w-2xl h-14 bg-primary text-on-primary font-label-lg text-lg rounded-lg shadow-xl flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span> Guardar
</button>
</footer>

</body>
</html>
