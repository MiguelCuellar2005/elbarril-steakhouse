<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{% if evento %}Editar{% else %}Agregar{% endif %} Evento | El Barril</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="{{ url_for('static', filename='js/tailwind-config.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
<style>
        body { background-color: #f9f9fa; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center">

<header class="w-full border-b-2 border-on-surface/10 bg-surface flex items-center justify-between px-4 h-14 fixed top-0 z-50">
<a href="{{ url_for('admin.eventos') }}" class="flex items-center gap-1 text-primary p-2 rounded-lg">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-label-lg text-sm">Cancelar</span>
</a>
<h1 class="font-headline-sm text-xl text-primary font-bold">{% if evento %}Editar{% else %}Agregar{% endif %} Evento</h1>
<div class="w-16"></div>
</header>

<main class="w-full max-w-2xl pt-20 pb-32 px-4">
<form method="POST" class="space-y-6" id="evento-form">

<section class="bg-surface-container-low p-4 rounded-lg border border-on-surface/10 space-y-3">
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Nombre del evento</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="nombre_evento" required type="text" placeholder="Ej. Feria de comida de Quebec" value="{{ evento.nombre_evento if evento else '' }}"/>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Ubicación</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="ubicacion" required type="text" placeholder="Ej. Place George-V, Quebec" value="{{ evento.ubicacion if evento else '' }}"/>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Fecha</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="fecha" required type="date" value="{{ evento.fecha if evento else '' }}"/>
</div>
<div class="grid grid-cols-2 gap-3">
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Hora inicio</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="hora_inicio" type="time" value="{{ evento.hora_inicio if evento else '' }}"/>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Hora fin</label>
<input class="w-full h-12 px-4 bg-white border-2 border-on-surface/10 rounded-lg" name="hora_fin" type="time" value="{{ evento.hora_fin if evento else '' }}"/>
</div>
</div>
<div>
<label class="block font-label-md text-sm text-on-surface-variant mb-1">Notas (opcional)</label>
<textarea class="w-full p-3 bg-white border-2 border-on-surface/10 rounded-lg resize-none" name="notas" rows="2">{{ evento.notas if evento else '' }}</textarea>
</div>
</section>

{% if evento %}
<div class="pt-2">
<button type="submit" formaction="{{ url_for('admin.evento_eliminar', evento_id=evento.id) }}" formmethod="POST"
        class="w-full flex items-center justify-center gap-2 h-12 text-error font-label-lg rounded-lg border border-error/30"
        onclick="return confirm('¿Eliminar este evento?')">
<span class="material-symbols-outlined">delete</span> Eliminar Evento
</button>
</div>
{% endif %}

</form>
</main>

<footer class="fixed bottom-0 left-0 w-full bg-surface border-t-2 border-on-surface/10 p-4 flex justify-center">
<button form="evento-form" type="submit" class="w-full max-w-2xl h-14 bg-primary text-on-primary font-label-lg text-lg rounded-lg shadow-xl flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span> Guardar
</button>
</footer>

</body>
</html>
