<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Galería de Fotos - El Barril</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="{{ url_for('static', filename='js/tailwind-config.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
<style>
        body { background-color: #fdfaf5; }
</style>
</head>
<body class="min-h-screen text-on-surface">

<header class="sticky top-0 z-40 bg-surface flex items-center justify-between px-4 h-14 w-full border-b-2 border-on-surface/10">
<div class="flex items-center gap-3">
<a href="{{ url_for('admin.dashboard') }}" class="material-symbols-outlined text-primary p-2 rounded-full">arrow_back</a>
<h1 class="font-headline-md text-xl text-primary font-bold">Galería de Fotos</h1>
</div>
</header>

<div class="max-w-4xl mx-auto w-full p-4 pb-24">

<form method="POST" action="{{ url_for('admin.galeria_foto_subir') }}" enctype="multipart/form-data" class="bg-surface-container-lowest p-4 rounded-lg border border-on-surface/10 space-y-2 mb-6">
<input type="file" name="imagen" accept="image/*" required class="w-full text-sm">
<input type="text" name="descripcion" placeholder="Descripción (opcional)" class="w-full h-10 px-3 bg-white border-2 border-on-surface/10 rounded-lg text-sm">
<button type="submit" class="w-full h-10 bg-primary text-on-primary rounded-lg text-sm font-label-md">Agregar Foto</button>
</form>

<div class="grid grid-cols-2 md:grid-cols-3 gap-3">
{% for foto in fotos %}
<div class="relative rounded-lg overflow-hidden aspect-square">
<img src="{{ url_for('static', filename='uploads/' + foto.imagen) }}" class="w-full h-full object-cover">
{% if foto.descripcion %}
<div class="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-xs p-1 text-center">{{ foto.descripcion }}</div>
{% endif %}
<form method="POST" action="{{ url_for('admin.galeria_foto_eliminar', foto_id=foto.id) }}" class="absolute top-1 right-1">
<button type="submit" class="w-7 h-7 bg-white/90 rounded-full flex items-center justify-center text-error" onclick="return confirm('¿Eliminar esta foto?')">
<span class="material-symbols-outlined text-sm">delete</span>
</button>
</form>
</div>
{% endfor %}
</div>

{% if not fotos %}
<p class="text-center text-on-surface-variant py-12">Aún no hay fotos en la galería.</p>
{% endif %}

</div>

</body>
</html>
